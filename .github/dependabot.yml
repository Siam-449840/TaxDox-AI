version: 2
updates:
  # npm dependencies — weekly, grouped to reduce PR noise.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      react:
        patterns: ['react', 'react-dom', '@types/react*']
      nextjs:
        patterns: ['next', 'eslint-config-next']
      prisma:
        patterns: ['prisma', '@prisma/client']
      radix:
        patterns: ['@radix-ui/*']
      lint:
        patterns: ['eslint*', 'typescript', '@types/*']
    # Security updates always; minor/major wait for batching.
    allow:
      - dependency-type: direct
      - dependency-type: indirect
        update-types: [security]
    commit-message:
      prefix: deps
    labels: [dependencies]

  # GitHub Actions versions — weekly.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
